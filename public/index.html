<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人记账本 - 实时同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', 'PingFang SC', sans-serif;
            background: #FAF0E6 url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A373' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            padding: 20px;
            color: #5D4037;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #5D4037;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #E9C46A;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            cursor: pointer;
            position: relative;
            display: inline-block;
            width: 100%;
        }
        h1:hover .edit-icon {
            opacity: 1;
        }
        .edit-icon {
            font-size: 1.2rem;
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 项目名称编辑 */
        .project-name-edit {
            background: #FFF8E7;
            border: 3px solid #D4A373;
            border-radius: 15px 20px 18px 12px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.15);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .project-name-edit input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #D7CCC8;
            border-radius: 8px 12px 10px 15px;
            font-size: 18px;
            background: #FFF;
            color: #5D4037;
        }
        .project-name-edit .btn {
            width: auto;
            padding: 10px 20px;
        }

        /* 登录/创建项目界面 - 手绘风格 */
        .auth-container {
            background: #FFF8E7;
            border: 3px solid #D4A373;
            border-radius: 20px 15px 25px 18px;
            padding: 40px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.15);
            transform: rotate(-0.5deg);
        }
        .auth-container h2 {
            text-align: center;
            color: #5D4037;
            margin-bottom: 30px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5D4037;
            font-weight: bold;
            font-size: 15px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #D7CCC8;
            border-radius: 8px 12px 10px 15px;
            font-size: 16px;
            background: #FFF;
            color: #5D4037;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #D4A373;
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: 2px solid #5D4037;
            border-radius: 10px 8px 12px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        .btn-primary {
            background: #D4A373;
            color: #FFF;
            box-shadow: 3px 3px 0 #5D4037;
        }
        .btn-primary:hover {
            background: #C49365;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 #5D4037;
        }
        .btn-success {
            background: #E9C46A;
            color: #5D4037;
            box-shadow: 3px 3px 0 #5D4037;
        }
        .btn-success:hover {
            background: #E0BB5A;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 #5D4037;
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #8D6E63;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #D7CCC8 0px,
                #D7CCC8 5px,
                transparent 5px,
                transparent 10px
            );
        }
        .divider span {
            background: #FFF8E7;
            padding: 0 15px;
            position: relative;
            color: #8D6E63;
            font-style: italic;
        }

        /* 快速进入提示卡片 */
        .quick-enter-card {
            background: #FFF9C4;
            border: 3px solid #E9C46A;
            border-radius: 15px 20px 18px 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 3px 3px 0 rgba(93, 64, 55, 0.1);
            transform: rotate(0.5deg);
            display: none;
        }
        .quick-enter-card.show {
            display: block;
        }
        .quick-enter-card h3 {
            color: #5D4037;
            font-size: 16px;
            margin-bottom: 10px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        .quick-enter-card p {
            color: #5D4037;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .quick-enter-card .room-code {
            font-weight: bold;
            color: #D4A373;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: #FFF;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #D7CCC8;
        }
        .quick-enter-buttons {
            display: flex;
            gap: 10px;
        }
        .quick-enter-buttons .btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
        .btn-secondary {
            background: #D7CCC8;
            color: #5D4037;
            border: 2px solid #5D4037;
            box-shadow: 2px 2px 0 #5D4037;
        }
        .btn-secondary:hover {
            background: #C9BEB5;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #5D4037;
        }

        /* 主界面 */
        .main-container {
            display: none;
        }
        .room-info {
            background: #FFF8E7;
            border: 3px solid #D4A373;
            border-radius: 15px 20px 18px 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.1);
            transform: rotate(-0.3deg);
        }
        .room-code {
            font-size: 24px;
            font-weight: bold;
            color: #D4A373;
            cursor: pointer;
            user-select: all;
            font-family: 'Courier New', monospace;
            background: #FFF;
            padding: 5px 12px;
            border-radius: 8px;
            border: 2px dashed #D4A373;
        }
        .room-code:hover {
            background: #FFF9C4;
            border-style: solid;
        }
        .members-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .member-tag {
            background: #FFE0B2;
            color: #5D4037;
            padding: 5px 12px;
            border-radius: 15px 20px 18px 12px;
            font-size: 14px;
            border: 2px solid #D4A373;
            font-weight: bold;
        }
        .member-tag.me {
            background: #D4A373;
            color: #FFF;
            border: 2px solid #5D4037;
        }

        /* 内容区域 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* datetime-local 移动端适配 */
        input[type="datetime-local"] {
            width: 100%;
            min-width: 100%;
        }
        @media (max-width: 600px) {
            input[type="datetime-local"] {
                font-size: 14px;
                padding: 10px 8px;
            }
        }

        /* 卡片 */
        .card {
            background: #FFF8E7;
            border: 3px solid #D4A373;
            border-radius: 20px 15px 25px 18px;
            padding: 25px;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.1);
            transform: rotate(0.2deg);
        }
        .card h3 {
            color: #5D4037;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        .card h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #D4A373;
            border-radius: 2px;
        }

        /* 表单样式 */
        select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #D7CCC8;
            border-radius: 8px 12px 10px 15px;
            font-size: 16px;
            background: #FFF;
            color: #5D4037;
            transition: all 0.3s;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: #D4A373;
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 参与人选择 */
        .participants-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .participant-option {
            padding: 8px 16px;
            border: 2px solid #D7CCC8;
            border-radius: 20px 15px 25px 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            background: #FFF;
            color: #5D4037;
        }
        .participant-option:hover {
            border-color: #D4A373;
            background: #FFF9C4;
        }
        .participant-option.selected {
            background: #D4A373;
            color: #FFF;
            border-color: #5D4037;
        }

        /* 统计 */
        .total-display {
            text-align: center;
            padding: 30px;
            background: #E9C46A;
            border: 3px solid #5D4037;
            border-radius: 20px 15px 25px 18px;
            color: #5D4037;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.2);
            transform: rotate(-0.5deg);
        }
        .total-display .label {
            font-size: 14px;
            font-weight: bold;
        }
        .total-display .value {
            font-size: 48px;
            font-weight: bold;
            margin-top: 10px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .stat-item {
            background: #FFF9C4;
            padding: 15px;
            border-radius: 15px 20px 18px 12px;
            border: 2px solid #E9C46A;
        }
        .stat-item .label {
            font-size: 12px;
            color: #8D6E63;
            font-weight: bold;
        }
        .stat-item .value {
            font-size: 20px;
            font-weight: bold;
            color: #5D4037;
            margin-top: 5px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }

        /* 类别条形图 */
        .category-chart {
            margin-top: 15px;
        }
        .chart-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .chart-label {
            width: 50px;
            font-size: 13px;
            color: #5D4037;
            font-weight: bold;
            text-align: right;
            flex-shrink: 0;
        }
        .chart-bar-wrapper {
            flex: 1;
            background: #FFF;
            border: 2px solid #D7CCC8;
            border-radius: 10px;
            height: 28px;
            overflow: hidden;
            position: relative;
        }
        .chart-bar {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #5D4037;
            transition: width 0.5s ease;
            box-shadow: 2px 0 0 rgba(93, 64, 55, 0.1);
        }

        /* 类别管理 */
        .category-manage {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #D7CCC8;
        }
        .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .category-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 15px 12px 18px 10px;
            font-size: 13px;
            font-weight: bold;
            color: #5D4037;
            border: 2px solid;
            background: #FFF;
        }
        .category-tag .delete-btn {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: none;
            background: rgba(93, 64, 55, 0.2);
            color: #5D4037;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
        }
        .category-tag .delete-btn:hover {
            background: rgba(93, 64, 55, 0.4);
        }
        .category-add-form {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .category-add-form input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #D7CCC8;
            border-radius: 8px 12px 10px 15px;
            font-size: 14px;
        }
        .category-add-form .btn {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }

        /* AA 结果 */
        .aa-result {
            background: #E8F5E9;
            border: 2px solid #81C784;
            border-radius: 20px 15px 25px 18px;
            padding: 20px;
            box-shadow: 3px 3px 0 rgba(93, 64, 55, 0.1);
        }
        .aa-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 2px dashed #A5D6A7;
        }
        .aa-item:last-child {
            border-bottom: none;
        }
        .aa-item .from-to {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .aa-item .arrow {
            color: #4CAF50;
            font-weight: bold;
        }
        .aa-item .amount {
            font-weight: bold;
            color: #2E7D32;
            font-size: 18px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        .balance-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .balance-positive {
            color: #2E7D32;
            font-weight: bold;
        }
        .balance-negative {
            color: #C62828;
            font-weight: bold;
        }

        /* 消费列表 */
        .expense-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .expense-item {
            background: #FFF8E7;
            border: 2px solid #D7CCC8;
            border-radius: 20px 15px 25px 18px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            box-shadow: 3px 3px 0 rgba(93, 64, 55, 0.1);
            transform: rotate(-0.2deg);
        }
        .expense-info {
            flex: 1;
        }
        .expense-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .expense-category {
            background: #D4A373;
            color: #FFF;
            padding: 2px 8px;
            border-radius: 8px 12px 10px 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .expense-amount {
            font-size: 20px;
            font-weight: bold;
            color: #5D4037;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        .expense-meta {
            font-size: 13px;
            color: #8D6E63;
            margin-top: 5px;
        }
        .btn-delete {
            background: #E57373;
            color: #FFF;
            border: 2px solid #5D4037;
            padding: 5px 12px;
            border-radius: 8px 12px 10px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 2px 2px 0 #5D4037;
        }
        .btn-delete:hover {
            background: #EF5350;
            transform: translate(-1px, -1px);
        }
        .btn-edit {
            background: #81C784;
            color: #FFF;
            border: 2px solid #5D4037;
            padding: 5px 12px;
            border-radius: 8px 12px 10px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            box-shadow: 2px 2px 0 #5D4037;
        }
        .btn-edit:hover {
            background: #66BB6A;
            transform: translate(-1px, -1px);
        }
        .btn-save {
            background: #4CAF50;
            color: #FFF;
            border: 2px solid #5D4037;
            padding: 5px 12px;
            border-radius: 8px 12px 10px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            box-shadow: 2px 2px 0 #5D4037;
        }
        .btn-save:hover {
            background: #43A047;
            transform: translate(-1px, -1px);
        }
        .btn-cancel {
            background: #B0BEC5;
            color: #5D4037;
            border: 2px solid #5D4037;
            padding: 5px 12px;
            border-radius: 8px 12px 10px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 2px 2px 0 #5D4037;
        }
        .btn-cancel:hover {
            background: #90A4AE;
            transform: translate(-1px, -1px);
        }
        .expense-actions {
            display: flex;
            gap: 8px;
        }
        .expense-edit-form {
            display: none;
            background: #FFF9C4;
            border: 2px solid #E9C46A;
            padding: 15px;
            border-radius: 15px 20px 18px 12px;
            margin-top: 10px;
            box-shadow: 3px 3px 0 rgba(93, 64, 55, 0.1);
        }
        .expense-edit-form.show {
            display: block;
        }
        .edit-field {
            margin-bottom: 10px;
        }
        .edit-field label {
            display: block;
            font-size: 12px;
            color: #5D4037;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .edit-field input, .edit-field select {
            width: 100%;
            padding: 6px 10px;
            border: 2px solid #D7CCC8;
            border-radius: 8px 12px 10px 15px;
            font-size: 14px;
            background: #FFF;
            color: #5D4037;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8D6E63;
            font-style: italic;
        }

        /* 在线状态 */
        .online-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4CAF50;
            font-size: 14px;
            font-weight: bold;
        }
        .online-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
            border: 2px solid #5D4037;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Toast 提示 - 手绘风格 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #5D4037;
            color: #FFF8E7;
            padding: 15px 30px;
            border-radius: 15px 20px 18px 12px;
            box-shadow: 4px 4px 0 rgba(93, 64, 55, 0.3);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            font-weight: bold;
            border: 2px solid #D4A373;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="projectTitle" onclick="startEditProjectName()">
            <span id="projectNameDisplay">📒 多人记账本</span>
            <span class="edit-icon">✏️</span>
        </h1>

        <!-- 项目名称编辑框 -->
        <div class="project-name-edit" id="projectNameEditContainer" style="display: none;">
            <input type="text" id="projectNameEditInput" placeholder="输入项目名称">
            <button class="btn btn-save" onclick="saveProjectName()">保存</button>
            <button class="btn btn-cancel" onclick="cancelEditProjectName()">取消</button>
        </div>

        <!-- 登录/创建项目界面 -->
        <div class="auth-container" id="authContainer">
            <h2>开始记账</h2>

            <!-- 快速进入提示卡片 -->
            <div class="quick-enter-card" id="quickEnterCard">
                <h3>👋 欢迎回来！</h3>
                <p>您之前加入过记账项目 <span class="room-code" id="savedRoomCode"></span>，是否以 <strong id="savedNickname"></strong> 身份直接进入？</p>
                <div class="quick-enter-buttons">
                    <button class="btn btn-primary" onclick="quickEnter()">直接进入</button>
                    <button class="btn btn-secondary" onclick="showNormalForm()">重新输入</button>
                </div>
            </div>

            <div id="normalForm">
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="nicknameInput" placeholder="输入你的昵称" value="我">
            </div>
            <div class="form-group" id="projectNameGroup">
                <label>项目名称（可选）</label>
                <input type="text" id="projectNameInput" placeholder="例如：周末聚餐、旅行记账" value="">
            </div>
            <button class="btn btn-primary" onclick="createRoom()">创建新项目</button>
            <div class="divider"><span>或</span></div>
            <div class="form-group">
                <label>项目码</label>
                <input type="text" id="roomCodeInput" placeholder="输入6位项目码">
            </div>
            <button class="btn btn-success" onclick="joinRoom()">加入项目</button>
            </div>
        </div>

        <!-- 主界面 -->
        <div class="main-container" id="mainContainer">
            <div class="room-info">
                <div>
                    <div style="font-size: 14px; color: #666; margin-bottom: 5px;">
                        项目码（分享给朋友）
                    </div>
                    <div class="room-code" id="roomCodeDisplay" onclick="copyRoomCode()">-</div>
                </div>
                <div style="text-align: right;">
                    <div class="online-status">实时同步中</div>
                    <div class="members-list" id="membersList"></div>
                </div>
            </div>

            <div class="content-grid">
                <!-- 左侧：添加记录 -->
                <div>
                    <div class="card" style="margin-bottom: 20px;">
                        <h3>记一笔</h3>
                        <form id="expenseForm" onsubmit="addExpense(event)">
                            <div class="form-group">
                                <label>时间</label>
                                <input type="datetime-local" id="datetime" required>
                            </div>
                            <div class="form-group">
                                <label>类型</label>
                                <select id="category" required>
                                    <option value="餐饮">🍔 餐饮</option>
                                    <option value="交通">🚗 交通</option>
                                    <option value="购物">🛍️ 购物</option>
                                    <option value="娱乐">🎮 娱乐</option>
                                    <option value="居住">🏠 居住</option>
                                    <option value="医疗">🏥 医疗</option>
                                    <option value="学习">📚 学习</option>
                                    <option value="其他">📦 其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>金额（元）</label>
                                <input type="number" id="amount" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label>付款人</label>
                                <select id="payer" required></select>
                            </div>
                            <div class="form-group">
                                <label>参与人（点击选择/取消）</label>
                                <div class="participants-select" id="participantsSelect"></div>
                            </div>
                            <div class="form-group">
                                <label>备注</label>
                                <input type="text" id="note" placeholder="可选">
                            </div>
                            <button type="submit" class="btn btn-primary">添加记录</button>
                        </form>
                    </div>

                    <div class="card">
                        <h3>统计概览</h3>
                        <div class="total-display">
                            <div class="label">总支出</div>
                            <div class="value">¥<span id="totalAmount">0.00</span></div>
                        </div>
                        <div class="category-chart" id="categoryChart"></div>
                        <div class="category-manage" id="categoryManage">
                            <div class="category-list" id="categoryList"></div>
                            <div class="category-add-form" id="categoryAddForm" style="display: none;">
                                <input type="text" id="newCategoryName" placeholder="输入类别名称" maxlength="10">
                                <button class="btn btn-primary" onclick="addCategory()">添加</button>
                                <button class="btn" onclick="toggleCategoryForm()">取消</button>
                            </div>
                            <button class="btn btn-success" id="showCategoryFormBtn" onclick="toggleCategoryForm()">+ 添加类别</button>
                        </div>
                    </div>
                </div>

                <!-- 右侧：AA 和记录列表 -->
                <div>
                    <div class="card" style="margin-bottom: 20px;">
                        <h3>AA 制结算</h3>
                        <div id="aaResult">
                            <div class="empty-state">暂无消费记录</div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>消费记录</h3>
                        <div class="expense-list" id="expenseList">
                            <div class="empty-state">暂无记录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = null;
        let currentRoomName = '未命名项目';
        let currentNickname = '';
        let members = [];
        let expenses = [];
        let categories = [];

        // 预设颜色（用于自动分配）
        const presetColors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F8B195', '#D4A373', '#F4A261', '#2A9D8F', '#E76F51', '#264653'];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('datetime').value = now.toISOString().slice(0, 16);

            // 检查是否有保存的项目信息
            checkSavedRoom();
        });

        // 检查保存的项目信息
        function checkSavedRoom() {
            try {
                const savedData = localStorage.getItem('lastRoom');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    // 检查是否在7天内
                    const now = Date.now();
                    const savedTime = data.timestamp || 0;
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;

                    if (now - savedTime < sevenDays && data.roomCode && data.nickname) {
                        // 显示快速进入卡片
                        document.getElementById('savedRoomCode').textContent = data.roomCode;
                        document.getElementById('savedNickname').textContent = data.nickname;
                        document.getElementById('quickEnterCard').classList.add('show');
                        document.getElementById('normalForm').style.display = 'none';
                    }
                }
            } catch (e) {
                console.error('读取保存的项目信息失败', e);
            }
        }

        // 快速进入
        function quickEnter() {
            try {
                const savedData = localStorage.getItem('lastRoom');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    currentRoom = data.roomCode;
                    currentNickname = data.nickname;
                    joinRoomInternal(currentRoom, currentNickname);
                }
            } catch (e) {
                showToast('快速进入失败，请重新输入');
                showNormalForm();
            }
        }

        // 显示正常表单
        function showNormalForm() {
            document.getElementById('quickEnterCard').classList.remove('show');
            document.getElementById('normalForm').style.display = 'block';
        }

        // 保存项目信息
        function saveRoomInfo(roomCode, nickname) {
            try {
                localStorage.setItem('lastRoom', JSON.stringify({
                    roomCode: roomCode,
                    nickname: nickname,
                    timestamp: Date.now()
                }));
            } catch (e) {
                console.error('保存项目信息失败', e);
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 创建项目
        async function createRoom() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const projectName = document.getElementById('projectNameInput').value.trim();
            if (!nickname) {
                showToast('请输入昵称');
                return;
            }

            try {
                const res = await fetch('/api/room/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: projectName || '未命名项目' })
                });
                const data = await res.json();
                if (data.success) {
                    currentRoom = data.roomCode;
                    currentNickname = nickname;
                    await joinRoomInternal(currentRoom, nickname);
                }
            } catch (err) {
                showToast('创建项目失败');
            }
        }

        // 加入项目
        async function joinRoom() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();

            if (!nickname) {
                showToast('请输入昵称');
                return;
            }
            if (!roomCode) {
                showToast('请输入项目码');
                return;
            }

            currentRoom = roomCode;
            currentNickname = nickname;
            await joinRoomInternal(roomCode, nickname);
        }

        // 内部加入项目逻辑
        async function joinRoomInternal(roomCode, nickname) {
            try {
                const res = await fetch('/api/room/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomCode, nickname })
                });
                const data = await res.json();

                if (data.success) {
                    members = data.members;
                    expenses = data.expenses;
                    categories = data.categories || [];
                    currentRoomName = data.roomName || '未命名项目';
                    enterMainInterface(roomCode);
                    setupSocketListeners();
                    updateUI();
                    updateProjectNameDisplay();
                    showToast('成功进入项目！');
                    // 保存项目信息到 localStorage
                    saveRoomInfo(roomCode, nickname);
                } else {
                    showToast(data.error || '加入失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        // 进入主界面
        function enterMainInterface(roomCode) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('roomCodeDisplay').textContent = roomCode;

            // 更新付款人选择
            updatePayerSelect();
            // 更新参与人选择
            updateParticipantsSelect();
            // 更新类别选择器
            updateCategorySelect();
            // 更新类别列表显示
            updateCategoryList();
        }

        // 设置 Socket 监听
        function setupSocketListeners() {
            socket.emit('room:join', currentRoom);

            socket.on('expense:added', (expense) => {
                expenses.unshift(expense);
                updateUI();
                showToast(`${expense.createdBy || '有人'} 添加了一笔消费`);
            });

            socket.on('expense:deleted', (data) => {
                expenses = expenses.filter(e => e.id !== data.id);
                updateUI();
            });

            socket.on('expense:updated', (expense) => {
                const index = expenses.findIndex(e => e.id === expense.id);
                if (index !== -1) {
                    expenses[index] = expense;
                    updateUI();
                    showToast(`${expense.createdBy || '有人'} 修改了一条记录`);
                }
            });

            socket.on('room:nameUpdated', (data) => {
                currentRoomName = data.name;
                updateProjectNameDisplay();
                showToast(`${data.updatedBy || '有人'} 修改了项目名称`);
            });

            socket.on('category:added', (category) => {
                categories.push(category);
                updateCategorySelect();
                updateCategoryList();
                showToast(`添加了新类别: ${category.name}`);
            });

            socket.on('category:deleted', (data) => {
                categories = categories.filter(c => c.name !== data.name);
                updateCategorySelect();
                updateCategoryList();
                showToast(`删除了类别: ${data.name}`);
            });
        }

        // 更新付款人下拉框
        function updatePayerSelect() {
            const select = document.getElementById('payer');
            select.innerHTML = members.map(m =>
                `<option value="${m}" ${m === currentNickname ? 'selected' : ''}>${m}</option>`
            ).join('');
        }

        // 更新参与人选择
        function updateParticipantsSelect() {
            const container = document.getElementById('participantsSelect');
            container.innerHTML = members.map(m => {
                const isSelected = m === currentNickname;
                return `<div class="participant-option ${isSelected ? 'selected' : ''}" onclick="toggleParticipant(this, '${m}')">${m}</div>`;
            }).join('');
        }

        // 切换参与人选择
        function toggleParticipant(el, name) {
            el.classList.toggle('selected');
        }

        // 编辑模式下切换参与人选择
        function toggleEditParticipant(el, name) {
            el.classList.toggle('selected');
        }

        // 更新类别选择器
        function updateCategorySelect() {
            const select = document.getElementById('category');
            select.innerHTML = categories.map(c =>
                `<option value="${c.name}">${c.name}</option>`
            ).join('');
        }

        // 更新类别列表显示
        function updateCategoryList() {
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map(c => `
                <div class="category-tag" style="border-color: ${c.color};">
                    ${c.name}
                    <button class="delete-btn" onclick="deleteCategory('${c.name}')">×</button>
                </div>
            `).join('');
        }

        // 切换类别添加表单
        function toggleCategoryForm() {
            const form = document.getElementById('categoryAddForm');
            const btn = document.getElementById('showCategoryFormBtn');
            if (form.style.display === 'none') {
                form.style.display = 'flex';
                btn.style.display = 'none';
                document.getElementById('newCategoryName').focus();
            } else {
                form.style.display = 'none';
                btn.style.display = 'block';
                document.getElementById('newCategoryName').value = '';
            }
        }

        // 添加类别
        async function addCategory() {
            const input = document.getElementById('newCategoryName');
            const name = input.value.trim();

            if (!name) {
                showToast('请输入类别名称');
                return;
            }

            if (categories.some(c => c.name === name)) {
                showToast('类别已存在');
                return;
            }

            // 自动分配颜色
            const color = presetColors[categories.length % presetColors.length];

            try {
                const res = await fetch(`/api/room/${currentRoom}/categories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color, sortOrder: categories.length })
                });

                const data = await res.json();

                if (data.success) {
                    categories.push(data.category);
                    updateCategorySelect();
                    updateCategoryList();
                    toggleCategoryForm();
                    showToast('类别添加成功');
                } else {
                    showToast(data.error || '添加失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        // 删除类别
        async function deleteCategory(name) {
            if (!confirm(`确定要删除类别 "${name}" 吗？`)) {
                return;
            }

            try {
                const res = await fetch(`/api/room/${currentRoom}/categories/${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });

                const data = await res.json();

                if (data.success) {
                    categories = categories.filter(c => c.name !== name);
                    updateCategorySelect();
                    updateCategoryList();
                    showToast('类别已删除');
                } else {
                    showToast(data.error || '删除失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        // 添加消费记录
        async function addExpense(e) {
            e.preventDefault();

            const selectedParticipants = Array.from(document.querySelectorAll('.participant-option.selected'))
                .map(el => el.textContent);

            if (selectedParticipants.length === 0) {
                showToast('至少选择一位参与人');
                return;
            }

            const expense = {
                datetime: document.getElementById('datetime').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                payer: document.getElementById('payer').value,
                participants: selectedParticipants,
                note: document.getElementById('note').value,
                createdBy: currentNickname
            };

            try {
                const res = await fetch(`/api/expenses/${currentRoom}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(expense)
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('expenseForm').reset();
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    document.getElementById('datetime').value = now.toISOString().slice(0, 16);
                    updateParticipantsSelect();
                }
            } catch (err) {
                showToast('添加失败');
            }
        }

        // 删除消费记录
        async function deleteExpense(id) {
            if (!confirm('确定删除这条记录吗？')) return;

            try {
                const res = await fetch(`/api/expenses/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomCode: currentRoom })
                });

                if (res.ok) {
                    // 本地立即删除，不等待 socket 事件
                    expenses = expenses.filter(e => e.id !== id);
                    updateUI();
                    showToast('记录已删除');
                } else {
                    showToast('删除失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        // 更新界面
        function updateUI() {
            updateMembersList();
            updateExpenseList();
            updateStats();
            updateAA();
        }

        // 更新成员列表
        function updateMembersList() {
            const container = document.getElementById('membersList');
            container.innerHTML = members.map(m =>
                `<span class="member-tag ${m === currentNickname ? 'me' : ''}">${m}</span>`
            ).join('');
        }

        // 更新消费列表
        function updateExpenseList() {
            const container = document.getElementById('expenseList');

            if (expenses.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }

            container.innerHTML = expenses.map(exp => {
                const date = new Date(exp.datetime);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                return `
                <div class="expense-item" id="expense-${exp.id}">
                    <div class="expense-info">
                        <div class="expense-header">
                            <span class="expense-category">${exp.category}</span>
                            <span class="expense-amount">¥${exp.amount.toFixed(2)}</span>
                        </div>
                        <div class="expense-meta">
                            ${timeStr} · ${exp.payer}付款 · 参与: ${exp.participants.join(', ')}
                            ${exp.note ? ' · ' + exp.note : ''}
                        </div>
                    </div>
                    <div class="expense-actions">
                        <button class="btn-edit" onclick="startEditExpense(${exp.id})">编辑</button>
                        <button class="btn-delete" onclick="deleteExpense(${exp.id})">删除</button>
                    </div>
                    <div class="expense-edit-form" id="edit-form-${exp.id}">
                        <div class="edit-field">
                            <label>金额</label>
                            <input type="number" id="edit-amount-${exp.id}" step="0.01" value="${exp.amount}">
                        </div>
                        <div class="edit-field">
                            <label>类型</label>
                            <select id="edit-category-${exp.id}">
                                ${categories.map(c => `<option value="${c.name}" ${c.name === exp.category ? 'selected' : ''}>${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="edit-field">
                            <label>付款人</label>
                            <select id="edit-payer-${exp.id}">
                                ${members.map(m => `<option value="${m}" ${m === exp.payer ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                        </div>
                        <div class="edit-field">
                            <label>参与人（点击选择/取消）</label>
                            <div class="participants-select" id="edit-participants-${exp.id}">
                                ${members.map(m => {
                                    const isSelected = exp.participants.includes(m);
                                    return `<div class="participant-option ${isSelected ? 'selected' : ''}" onclick="toggleEditParticipant(this, '${m}')">${m}</div>`;
                                }).join('')}
                            </div>
                        </div>
                        <div class="edit-field">
                            <label>备注</label>
                            <input type="text" id="edit-note-${exp.id}" value="${exp.note || ''}">
                        </div>
                        <div class="edit-actions">
                            <button class="btn-save" onclick="saveEditExpense(${exp.id})">保存</button>
                            <button class="btn-cancel" onclick="cancelEditExpense(${exp.id})">取消</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // 更新统计
        function updateStats() {
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('totalAmount').textContent = total.toFixed(2);

            // 按类型统计
            const byCategory = {};
            expenses.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            // 从全局 categories 数组构建颜色映射
            const categoryColorMap = {};
            categories.forEach(c => {
                categoryColorMap[c.name] = c.color;
            });

            const chartContainer = document.getElementById('categoryChart');
            const categoryEntries = Object.entries(byCategory);

            if (categoryEntries.length === 0) {
                chartContainer.innerHTML = '<div style="color:#999;font-size:14px;text-align:center;padding:20px;">暂无统计数据</div>';
            } else {
                // 按金额降序排序
                categoryEntries.sort((a, b) => b[1] - a[1]);
                const maxAmount = categoryEntries[0][1];

                chartContainer.innerHTML = categoryEntries.map(([cat, amt]) => {
                    const percentage = (amt / maxAmount * 100).toFixed(1);
                    const color = categoryColorMap[cat] || '#D4A373';
                    return `
                        <div class="chart-row">
                            <span class="chart-label">${cat}</span>
                            <div class="chart-bar-wrapper">
                                <div class="chart-bar" style="width: ${percentage}%; background: ${color};">
                                    ¥${amt.toFixed(0)}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // 更新 AA 计算
        function updateAA() {
            const container = document.getElementById('aaResult');

            if (expenses.length === 0 || members.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无消费记录</div>';
                return;
            }

            // 计算余额
            const balance = {};
            members.forEach(m => balance[m] = 0);

            expenses.forEach(exp => {
                const payer = exp.payer;
                const participants = exp.participants || [];
                const amount = exp.amount;

                if (!balance[payer]) balance[payer] = 0;
                balance[payer] += amount;

                if (participants.length > 1) {
                    const perPerson = amount / participants.length;
                    participants.forEach(p => {
                        if (!balance[p]) balance[p] = 0;
                        balance[p] -= perPerson;
                    });
                }
            });

            // 计算转账建议
            const receivers = [];
            const payersList = [];

            Object.entries(balance).forEach(([name, amt]) => {
                if (amt > 0.01) receivers.push({ name, amt });
                else if (amt < -0.01) payersList.push({ name, amt: -amt });
            });

            const transactions = [];
            payersList.forEach(payer => {
                let remaining = payer.amt;
                receivers.forEach(receiver => {
                    if (remaining <= 0) return;
                    const transfer = Math.min(remaining, receiver.amt);
                    if (transfer > 0.01) {
                        transactions.push({
                            from: payer.name,
                            to: receiver.name,
                            amount: transfer
                        });
                        remaining -= transfer;
                        receiver.amt -= transfer;
                    }
                });
            });

            // 生成 HTML
            let html = '<div class="aa-result">';

            if (transactions.length > 0) {
                html += '<h4 style="margin-bottom:15px;color:#2e7d32;">建议转账</h4>';
                html += transactions.map(t => `
                    <div class="aa-item">
                        <div class="from-to">
                            <span>${t.from}</span>
                            <span class="arrow">→</span>
                            <span>${t.to}</span>
                        </div>
                        <span class="amount">¥${t.amount.toFixed(2)}</span>
                    </div>
                `).join('');
            } else {
                html += '<p style="color:#2e7d32;text-align:center;">账目已平衡！</p>';
            }

            html += '<h4 style="margin:20px 0 10px;color:#666;">每人余额</h4>';
            Object.entries(balance).forEach(([name, amt]) => {
                if (Math.abs(amt) > 0.01) {
                    const isPositive = amt > 0;
                    html += `
                        <div class="balance-item">
                            <span>${name}</span>
                            <span class="${isPositive ? 'balance-positive' : 'balance-negative'}">
                                ${isPositive ? '应收' : '应付'} ¥${Math.abs(amt).toFixed(2)}
                            </span>
                        </div>
                    `;
                }
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // 开始编辑消费记录
        function startEditExpense(id) {
            // 隐藏其他所有编辑表单
            document.querySelectorAll('.expense-edit-form').forEach(form => {
                form.classList.remove('show');
            });
            // 显示当前编辑表单
            const editForm = document.getElementById(`edit-form-${id}`);
            if (editForm) {
                editForm.classList.add('show');
            }
        }

        // 取消编辑
        function cancelEditExpense(id) {
            const editForm = document.getElementById(`edit-form-${id}`);
            if (editForm) {
                editForm.classList.remove('show');
            }
        }

        // 保存编辑
        async function saveEditExpense(id) {
            const amount = parseFloat(document.getElementById(`edit-amount-${id}`).value);
            const category = document.getElementById(`edit-category-${id}`).value;
            const payer = document.getElementById(`edit-payer-${id}`).value;
            const note = document.getElementById(`edit-note-${id}`).value;

            // 获取选中的参与人
            const selectedParticipants = Array.from(document.querySelectorAll(`#edit-participants-${id} .participant-option.selected`))
                .map(el => el.textContent);

            if (isNaN(amount) || amount <= 0) {
                showToast('请输入有效金额');
                return;
            }

            if (selectedParticipants.length === 0) {
                showToast('至少选择一位参与人');
                return;
            }

            // 获取原始记录以保留时间字段
            const originalExpense = expenses.find(e => e.id === id);
            if (!originalExpense) {
                showToast('记录不存在');
                return;
            }

            const updatedExpense = {
                datetime: originalExpense.datetime,
                category,
                amount,
                payer,
                participants: selectedParticipants,
                note,
                createdBy: currentNickname
            };

            try {
                const res = await fetch(`/api/expenses/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomCode: currentRoom, ...updatedExpense })
                });
                const data = await res.json();

                if (data.success) {
                    // 本地更新（等待 socket 事件会再更新一次）
                    const index = expenses.findIndex(e => e.id === id);
                    if (index !== -1) {
                        expenses[index] = data.expense;
                        updateUI();
                    }
                    cancelEditExpense(id);
                } else {
                    showToast(data.error || '保存失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        // 复制项目码
        function copyRoomCode() {
            const code = document.getElementById('roomCodeDisplay').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('项目码已复制！');
            });
        }

        // 更新项目名称显示
        function updateProjectNameDisplay() {
            document.getElementById('projectNameDisplay').textContent = currentRoomName || '📒 多人记账本';
        }

        // 开始编辑项目名称
        function startEditProjectName() {
            document.getElementById('projectTitle').style.display = 'none';
            document.getElementById('projectNameEditContainer').style.display = 'flex';
            document.getElementById('projectNameEditInput').value = currentRoomName === '📒 多人记账本' ? '' : currentRoomName;
            document.getElementById('projectNameEditInput').focus();
        }

        // 取消编辑项目名称
        function cancelEditProjectName() {
            document.getElementById('projectTitle').style.display = 'inline-block';
            document.getElementById('projectNameEditContainer').style.display = 'none';
        }

        // 保存项目名称
        async function saveProjectName() {
            const newName = document.getElementById('projectNameEditInput').value.trim();
            if (!newName) {
                showToast('请输入项目名称');
                return;
            }

            try {
                const res = await fetch(`/api/room/${currentRoom}/name`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName, updatedBy: currentNickname })
                });
                const data = await res.json();

                if (data.success) {
                    currentRoomName = newName;
                    updateProjectNameDisplay();
                    cancelEditProjectName();
                    showToast('项目名称已更新');
                } else {
                    showToast(data.error || '更新失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }
    </script>
</body>
</html>
